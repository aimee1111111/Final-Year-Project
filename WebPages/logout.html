<!DOCTYPE html>
<html lang="en">
<head>
    <!-- character encoding -->
    <meta charset="UTF-8">

    <!-- makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title shown in browser tab -->
    <title>Logout</title>

    <!-- links the external CSS file -->
    <link rel="stylesheet" href="logout.css">
</head>
<body>

    <!-- main logout confirmation box -->
    <div class="logout-container">

        <!-- confirmation message -->
        <h1>Are you sure you want to log out?</h1>

        <!-- group for yes/no buttons -->
        <div class="button-group">

            <!-- yes button sends user back to login page -->
            <a href="login.html" class="btn yes">Yes</a>

            <!-- no button returns user to home page -->
            <a href="Home.html" class="btn no">No</a>
        </div>
    </div>

</body>
</html>
