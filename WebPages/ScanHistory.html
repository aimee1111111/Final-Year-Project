<!DOCTYPE html>
<html lang="en">
<head>
  <!-- character encoding -->
  <meta charset="UTF-8" />

  <!-- makes the page responsive on phones and tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- title shown in the browser tab -->
  <title>Scan History</title>

  <!-- links the external CSS file -->
  <link rel="stylesheet" href="ScanHistory.css" />

  <!-- links the JavaScript file that loads scan history -->
  <script defer src="History.js"></script>
</head>
<body>

  <!-- top navigation bar -->
  <nav class="navbar">
    <div class="nav-left">
      <!-- website logo/name -->
      <h2 class="logo">ThreatCheck</h2>
    </div>

    <div class="nav-right">
      <!-- navigation links -->
      <a href="Home.html">Home</a>
      <a href="Information.html">Information</a>
      <a href="ScanHistory.html">Scan History</a>
      <a href="posts.html">posts</a>
      <a href="CommonThreats.html">Common Threats</a>

      <!-- logout button -->
      <a href="logout.html" class="logout-btn">Log Out</a>
    </div>
  </nav>

  <!-- main scan history content -->
  <main class="history-main">
    <!-- page heading -->
    <h1>Your Scan History</h1>

    <!-- panel containing the scan history table -->
    <div class="panel panel-history">
      <table class="scan-table" aria-describedby="history-desc">

        <!-- table description for accessibility -->
        <caption id="history-desc">
          List of previously scanned files and their results
        </caption>

        <!-- table headings -->
        <thead>
          <tr>
            <th>Date</th>
            <th>Filename</th>
            <th>Status</th>
            <th>Message</th>
            <th>Threats</th>
            <th>Details</th>
          </tr>
        </thead>

        <!-- table body where scan history rows will be inserted by JavaScript -->
        <tbody id="scanHistoryBody">

          <!-- loading row shown while history is being fetched -->
          <tr>
            <td colspan="6" class="muted">
              <span class="spinner"></span>
              Loading your scan history...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Details modal -->
  <div id="scanDetailsModal" class="modal" aria-hidden="true">

    <!-- dark background behind modal -->
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <!-- modal box content -->
    <div class="modal-content">

      <!-- close button for modal -->
      <button class="close-btn" id="closeModal" aria-label="Close details">
        &times;
      </button>

      <!-- modal title -->
      <h2>Scan Details</h2>

      <!-- area where JavaScript will insert detailed scan info -->
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

</body>
</html>
